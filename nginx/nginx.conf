# nginx config for frontend production build
# Serves static React files and proxies API to backend services

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  server {
    listen 80;

    # Serve frontend static files
    location / {
      root /usr/share/nginx/html;
      index index.html;
      try_files $uri $uri/ /index.html;
    }

    # Proxy auth requests
    location /auth {
      proxy_pass http://auth-service:3051;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy main API requests
    location /api/v1 {
      proxy_pass http://main-service:3050;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
