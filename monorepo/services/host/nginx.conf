events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  server {
    listen 80;

    # Catalog microfrontend remote
    location /remote/catalog/ {
      proxy_pass http://catalog-app/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Matches microfrontend remote
    location /remote/matches/ {
      proxy_pass http://matches-app/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Auth API (rewrite /api/v1/auth → /auth on auth-service)
    location /api/v1/auth {
      rewrite ^/api/v1/auth(/.*)? /auth$1 break;
      proxy_pass http://auth-service:3051;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Main API
    location /api/v1 {
      proxy_pass http://main-service:3050;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Uploaded files
    location /uploads {
      proxy_pass http://main-service:3050;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    # Host SPA
    location / {
      root /usr/share/nginx/html;
      index index.html;
      try_files $uri $uri/ /index.html;
    }
  }
}
